apiVersion: apps/v1
kind: Deployment

metadata:
  name: hari-app
  labels:
    app: hari-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hari-app

  template:
    metadata:
      labels:
        app: hari-app

    spec:
      containers:
      - name: devops-container
        image: <203918862728.dkr.ecr.us-east-1.amazonaws.com/hari>:latest   # Docker image from ECR

        ports:
        - containerPort: 8080